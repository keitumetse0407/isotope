name: isotope_app
description: ISOTOPE - AI-Powered Gold Trading Signals
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.9

  # API & Network
  http: ^1.2.0
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1
  shared_preferences: ^2.2.2

  # Payments
  flutter_stripe: ^10.0.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^0.66.0

  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.4
  share_plus: ^7.2.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
